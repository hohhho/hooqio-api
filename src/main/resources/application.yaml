# application.yaml
spring:
  application:
    name: demo
  profiles:
    default: local # 기본 실행은 local
    group:
      local:
        - common
      prod:
        - common


---

# common

spring:
  config:
    activate:
      on-profile: common #local과 prod에서 공통으로 사용

  threads:
    virtual:
      enabled: true #가상 스레드 활성화


---

# local

spring:
  config:
    activate:
      on-profile: local
  #데이터베이스 연결 설정
  datasource:
    url: jdbc:postgresql://localhost:5433/demodb
    username: hooqio
    password: "hooqio1234"
    driver-class-name: org.postgresql.Driver
  #JPA/Hibernate 설정
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true # SQL을 보기 좋게 정렬
    open-in-view: false
  sql:
    init:
      mode: never # 자동 SQL 실행 끄기
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
# 로깅
logging:
  level:
    root: INFO
    com.zaxxer.hikari: WARN
    org.postgresql: WARN


---

# prod

spring:
  config:
    activate:
      on-profile: prod
  # 데이터베이스 연결 설정
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

# 로깅
logging:
  level:
    root: INFO
    com.zaxxer.hikari: WARN
    org.postgresql: WARN
